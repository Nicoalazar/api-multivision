<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Panel Admin - Fulbo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .auth-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .auth-section input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }

        .auth-section button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
        }

        .auth-section button:hover {
            background: #5568d3;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stat-card p {
            color: #666;
            font-size: 0.9em;
        }

        .section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-success:hover {
            background: #45a049;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        tbody tr:hover {
            background: #f5f5f5;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .badge-premium {
            background: #ffd700;
            color: #333;
        }

        .badge-basico {
            background: #e0e0e0;
            color: #666;
        }

        .badge-activo {
            background: #4caf50;
            color: white;
        }

        .badge-inactivo {
            background: #f44336;
            color: white;
        }

        .hidden {
            display: none;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        #searchInput {
            width: 100%;
            padding: 12px 20px;
            font-size: 1em;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #searchInput::placeholder {
            color: #999;
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 0.9em;
            }
            
            .btn {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚽ Panel Admin - Fulbo</h1>
            <p>Gestión de usuarios y sesiones</p>
        </div>

        <!-- Sección de autenticación -->
        <div id="authSection" class="auth-section">
            <h2>Autenticación</h2>
            <input type="text" id="apiUrl" placeholder="URL de la API (ej: https://api-multivision.onrender.com)" value="https://api-multivision.onrender.com">
            <input type="password" id="adminSecret" placeholder="Token de administrador">
            <button onclick="authenticate()">Conectar</button>
        </div>

        <!-- Panel principal (oculto hasta autenticar) -->
        <div id="mainPanel" class="hidden">
            <!-- Estadísticas -->
            <div id="statsSection" class="stats"></div>

            <!-- Crear usuario -->
            <div class="section">
                <h2>➕ Crear Usuario</h2>
                <div id="createAlert"></div>
                <form onsubmit="crearUsuario(event)">
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="newEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña:</label>
                        <input type="password" id="newPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Plan:</label>
                        <select id="newPlan">
                            <option value="1">Premium</option>
                            <option value="0">Básico</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">Crear Usuario</button>
                </form>
            </div>

            <!-- Lista de usuarios -->
            <div class="section">
                <h2>👥 Usuarios</h2>
                <button onclick="cargarUsuarios()" class="btn btn-primary">🔄 Actualizar</button>
                
                <!-- Filtro de búsqueda -->
                <div class="form-group" style="margin-top: 20px;">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar por email..." onkeyup="filtrarUsuarios()">
                </div>
                
                <div id="usuariosTable"></div>
            </div>

            <!-- Lista de sesiones -->
            <div class="section">
                <h2>📱 Sesiones Activas</h2>
                <button onclick="cargarSesiones()" class="btn btn-primary">🔄 Actualizar</button>
                <button onclick="limpiarSesiones()" class="btn btn-danger">🗑️ Limpiar Inactivas (7 días)</button>
                <div id="sesionesTable"></div>
            </div>
        </div>
    </div>

    <script>
        let API_URL = '';
        let ADMIN_TOKEN = '';

        async function authenticate() {
            API_URL = document.getElementById('apiUrl').value.trim();
            ADMIN_TOKEN = document.getElementById('adminSecret').value.trim();

            if (!API_URL || !ADMIN_TOKEN) {
                alert('Por favor completa todos los campos');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/admin/stats`, {
                    headers: {
                        'Authorization': `Bearer ${ADMIN_TOKEN}`
                    }
                });

                if (response.ok) {
                    document.getElementById('authSection').classList.add('hidden');
                    document.getElementById('mainPanel').classList.remove('hidden');
                    cargarEstadisticas();
                    cargarUsuarios();
                    cargarSesiones();
                } else {
                    alert('Token inválido o error de conexión');
                }
            } catch (error) {
                alert('Error conectando a la API: ' + error.message);
            }
        }

        async function cargarEstadisticas() {
            try {
                const response = await fetch(`${API_URL}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${ADMIN_TOKEN}` }
                });
                const data = await response.json();

                document.getElementById('statsSection').innerHTML = `
                    <div class="stat-card">
                        <h3>${data.usuarios.total}</h3>
                        <p>Total Usuarios</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.usuarios.activos}</h3>
                        <p>Usuarios Activos</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.usuarios.premium}</h3>
                        <p>Plan Premium</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.sesiones.total}</h3>
                        <p>Sesiones Activas</p>
                    </div>
                `;
            } catch (error) {
                console.error('Error cargando estadísticas:', error);
            }
        }

        async function crearUsuario(event) {
            event.preventDefault();
            
            const email = document.getElementById('newEmail').value;
            const password = document.getElementById('newPassword').value;
            const plan = document.getElementById('newPlan').value;

            try {
                const response = await fetch(`${API_URL}/admin/usuarios`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ADMIN_TOKEN}`
                    },
                    body: JSON.stringify({ email, password, plan })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('createAlert').innerHTML = 
                        '<div class="alert alert-success">✅ Usuario creado exitosamente</div>';
                    document.getElementById('newEmail').value = '';
                    document.getElementById('newPassword').value = '';
                    cargarUsuarios();
                    cargarEstadisticas();
                    setTimeout(() => {
                        document.getElementById('createAlert').innerHTML = '';
                    }, 3000);
                } else {
                    document.getElementById('createAlert').innerHTML = 
                        `<div class="alert alert-error">❌ ${data.error}</div>`;
                }
            } catch (error) {
                document.getElementById('createAlert').innerHTML = 
                    `<div class="alert alert-error">❌ Error: ${error.message}</div>`;
            }
        }

        let todosLosUsuarios = []; // Variable global para guardar todos los usuarios

        async function cargarUsuarios() {
            try {
                const response = await fetch(`${API_URL}/admin/usuarios`, {
                    headers: { 'Authorization': `Bearer ${ADMIN_TOKEN}` }
                });
                const data = await response.json();

                todosLosUsuarios = data.usuarios; // Guardar para el filtro
                renderUsuarios(todosLosUsuarios);
            } catch (error) {
                console.error('Error cargando usuarios:', error);
            }
        }

        function renderUsuarios(usuarios) {
            let html = `
                <table id="usuariosTableElement">
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Plan</th>
                            <th>Estado</th>
                            <th>Fecha Creación</th>
                            <th>Último Acceso</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            if (usuarios.length === 0) {
                html += `
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 40px; color: #999;">
                            No se encontraron usuarios
                        </td>
                    </tr>
                `;
            } else {
                usuarios.forEach(user => {
                    const planBadge = user.plan === '1' ? 'badge-premium' : 'badge-basico';
                    const planText = user.plan === '1' ? 'Premium' : 'Básico';
                    const estadoBadge = user.activo ? 'badge-activo' : 'badge-inactivo';
                    const estadoText = user.activo ? 'Activo' : 'Inactivo';

                    html += `
                        <tr>
                            <td>${user.email}</td>
                            <td><span class="badge ${planBadge}">${planText}</span></td>
                            <td><span class="badge ${estadoBadge}">${estadoText}</span></td>
                            <td>${new Date(user.fechaCreacion).toLocaleDateString()}</td>
                            <td>${new Date(user.ultimoAcceso).toLocaleDateString()}</td>
                            <td>
                                <button class="btn btn-primary" onclick="toggleEstado('${user._id}', ${!user.activo})">
                                    ${user.activo ? 'Desactivar' : 'Activar'}
                                </button>
                                <button class="btn btn-success" onclick="resetPasswordRapido('${user._id}', '${user.email}')">🔑 Reset Pass</button>
                                <button class="btn btn-danger" onclick="eliminarUsuario('${user._id}')">Eliminar</button>
                            </td>
                        </tr>
                    `;
                });
            }

            html += '</tbody></table>';
            document.getElementById('usuariosTable').innerHTML = html;
        }

        function filtrarUsuarios() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (searchTerm === '') {
                renderUsuarios(todosLosUsuarios);
                return;
            }

            const usuariosFiltrados = todosLosUsuarios.filter(user => 
                user.email.toLowerCase().includes(searchTerm)
            );

            renderUsuarios(usuariosFiltrados);
        }

        async function resetPasswordRapido(id, email) {
            const newPassword = prompt(`Ingresa la nueva contraseña para ${email}:`);
            
            if (!newPassword || newPassword.trim() === '') {
                alert('❌ Contraseña no puede estar vacía');
                return;
            }

            if (newPassword.length < 4) {
                alert('❌ La contraseña debe tener al menos 4 caracteres');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/admin/usuarios/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ADMIN_TOKEN}`
                    },
                    body: JSON.stringify({ password: newPassword })
                });

                if (response.ok) {
                    alert(`✅ Contraseña reseteada exitosamente para ${email}`);
                } else {
                    const data = await response.json();
                    alert(`❌ Error: ${data.error || 'Error desconocido'}`);
                }
            } catch (error) {
                alert('❌ Error de conexión: ' + error.message);
            }
        }
        async function toggleEstado(id, nuevoEstado) {
            try {
                await fetch(`${API_URL}/admin/usuarios/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ADMIN_TOKEN}`
                    },
                    body: JSON.stringify({ activo: nuevoEstado })
                });
                cargarUsuarios();
                cargarEstadisticas();
            } catch (error) {
                alert('Error actualizando usuario');
            }
        }

        async function eliminarUsuario(id) {
            if (!confirm('¿Estás seguro de eliminar este usuario?')) return;

            try {
                await fetch(`${API_URL}/admin/usuarios/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${ADMIN_TOKEN}` }
                });
                cargarUsuarios();
                cargarEstadisticas();
                cargarSesiones();
            } catch (error) {
                alert('Error eliminando usuario');
            }
        }

        async function cargarSesiones() {
            try {
                const response = await fetch(`${API_URL}/admin/sesiones`, {
                    headers: { 'Authorization': `Bearer ${ADMIN_TOKEN}` }
                });
                const data = await response.json();

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Device ID</th>
                                <th>Modelo</th>
                                <th>Última Actividad</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.sesiones.forEach(sesion => {
                    html += `
                        <tr>
                            <td>${sesion.email}</td>
                            <td>${sesion.deviceId.substring(0, 20)}...</td>
                            <td>${sesion.deviceModel}</td>
                            <td>${new Date(sesion.lastActive).toLocaleString()}</td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                document.getElementById('sesionesTable').innerHTML = html;
            } catch (error) {
                console.error('Error cargando sesiones:', error);
            }
        }

        async function limpiarSesiones() {
            if (!confirm('¿Eliminar sesiones inactivas de más de 7 días?')) return;

            try {
                const response = await fetch(`${API_URL}/admin/limpiar-sesiones`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ADMIN_TOKEN}`
                    },
                    body: JSON.stringify({ dias: 7 })
                });

                const data = await response.json();
                alert(`✅ ${data.sesionesEliminadas} sesiones eliminadas`);
                cargarSesiones();
                cargarEstadisticas();
            } catch (error) {
                alert('Error limpiando sesiones');
            }
        }
    </script>
</body>
</html>
